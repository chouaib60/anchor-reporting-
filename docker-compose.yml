
services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: raas
      POSTGRES_USER: raas
      POSTGRES_PASSWORD: raas
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  api:
    build: ./api
    depends_on: [postgres, minio]
    env_file: ./api/.env
    ports: ["8000:8000"]

  worker:
    build: ./worker
    depends_on: [postgres, minio]
    env_file: ./worker/.env

  ui:
    build: ./ui
    depends_on: [api]
    ports: ["3000:80"]

volumes:
  postgres_data:
  minio_data: